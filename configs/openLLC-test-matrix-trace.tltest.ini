# openLLC matrix trace
[tltest.config]
core                        = 1
core.tl_c                   = 1
core.tl_ul                  = 0
core.tl_m                   = 1
maximum_cycle               = 300000

[tltest.sequence]
mode.0                      = TRACE_WITH_FENCE
mode.1                      = TRACE_WITH_FENCE

[tltest.fuzzer]
trace.enable                = 1
trace.filepath              = ../traces/matrix-trace-64sets.ops