[tltest.config]
core                        = 1
core.tl_c                   = 1
core.tl_ul                  = 1
core.tl_m                   = 1
startup.cycle               = 10000
maximum_cycle               = 1200000
memory.enable               = 1
memory.start                = 0x00000000
memory.end                  = 0x00080000
memory.backend.ooor         = 0
memory.backend.rd.depth     = 0
memory.backend.rd.latency   = 0
memory.backend.wr.depth     = 0
memory.backend.wr.latency   = 0
memory.backend.cycle_unit   = 2
memory.backend.port.count   = 1
memory.sync.strict          = 0
mmio.enable                 = 0
mmio.start                  = 0
mmio.end                    = 0
cmo.enable                  = 0
cmo.enable.cbo.clean        = 1
cmo.enable.cbo.flush        = 1
cmo.enable.cbo.inval        = 1
cmo.start                   = 0x00000000
cmo.end                     = 0x00080000
cmo.parallel.depth          = 0

error.hintInaccurate        = 0

[tltest.sequence]
mode.0                      = TRACE_WITH_FENCE
mode.1                      = TRACE_WITH_FENCE
mode.2                      = TRACE_WITH_FENCE

[tltest.profile]
cycle_unit                  = 2

[tltest.fuzzer]
seed                        = 1000
ari.interval                = 10000
ari.target                  = 18
stream.interval             = 100
stream.step                 = 0x40
stream.start                = 0x00000000
stream.end                  = 0x00080000
unified.enable              = 0
unified.mode                = ANVIL
trace.enable                = 1
trace.filepath              = ../configs/coupledL2-test-trace-regress.ops
unified.anvil.size          = 256
unified.anvil.epoch         = 64
unified.anvil.width.b       = 1

[tltest.logger]
verbose                     = 0
verbose.xact_fired          = 1
verbose.xact_sequenced      = 0
verbose.xact_data_complete  = 1
verbose.memory.axi_write    = 1
verbose.memory.axi_read     = 1
verbose.data_full           = 0
verbose.agent_debug         = 0
